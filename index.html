<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Viral Video Link</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src='//libtl.com/sdk.js' data-zone='10939617' data-sdk='show_10939617'></script>
    <style>
        :root { --primary: #0088cc; --bg: #0b141a; --card: #1c2b36; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; margin: 0; }
        .card { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid #2d3d4a; max-width: 400px; margin: 20px auto; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        input { width: 100%; padding: 15px; border-radius: 12px; border: none; background: #2d3d4a; color: white; margin-bottom: 15px; outline: none; }
        .btn { background: var(--primary); color: white; border: none; padding: 16px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; font-size: 16px; }
        .btn:hover { opacity: 0.9; }
        #output-section { display: none; margin-top: 20px; text-align: left; background: var(--card); padding: 20px; border-radius: 15px; max-width: 450px; margin: 20px auto; }
        #result-content { white-space: pre-wrap; font-size: 14px; line-height: 1.6; color: #e0e0e0; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid var(--primary); border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; display: inline-block; margin-right: 10px; vertical-align: middle; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .tag-box { color: #0088cc; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color: #0088cc;">Viral Video Link AI</h2>
    
    <div id="input-card" class="card">
        <input type="text" id="yt-link" placeholder="Paste YouTube Link...">
        <button class="btn" onclick="askPermission('shorts')">🎬 Create AI Shorts</button>
        <button class="btn" style="background:#128c7e; margin-top:10px;" onclick="askPermission('seo')">🔍 AI SEO Research</button>
    </div>

    <div id="reward-gate" class="card" style="display:none;">
        <h3 style="margin-top:0;">Ready to Unlock!</h3>
        <p style="font-size: 14px; color: #aaa;">Please watch a short ad to see the AI result.</p>
        <button class="btn" style="background:#244b6d;" onclick="triggerAd()">Continue to Result</button>
    </div>

    <div id="output-section">
        <div id="loading" style="display:none; text-align: center; margin-bottom: 15px;">
            <div class="loader"></div> <span id="loading-text">Analyzing Video Data...</span>
        </div>
        <div id="result-content"></div>
        <button id="copy-btn" class="btn" style="display:none; background:#444; margin-top:15px;" onclick="copyResult()">📋 Copy Everything</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    const RAILWAY_URL = "https://ai-video-viralizer-raliway-production.up.railway.app";
    let currentTask = "";

    function askPermission(type) {
        const link = document.getElementById('yt-link').value;
        if(!link.includes('youtu')) return alert("Please enter a valid YouTube link.");
        currentTask = type;
        document.getElementById('input-card').style.display = 'none';
        document.getElementById('reward-gate').style.display = 'block';
    }

    function triggerAd() {
        show_10939617('pop').then(() => {
            callBackend();
        }).catch(() => {
            alert("Please wait for the ad to finish.");
        });
    }

    async function callBackend() {
        const link = document.getElementById('yt-link').value.trim();
        const resultContent = document.getElementById('result-content');
        const loading = document.getElementById('loading');
        
        document.getElementById('reward-gate').style.display = 'none';
        document.getElementById('output-section').style.display = 'block';
        loading.style.display = 'block';
        resultContent.innerText = "";

        try {
            const res = await fetch(`${RAILWAY_URL}/process?url=${encodeURIComponent(link)}&task=${currentTask}`);
            const data = await res.json();

            if(data.type === 'seo') {
                loading.style.display = 'none';
                resultContent.innerHTML = data.data;
                document.getElementById('copy-btn').style.display = 'block';
            } else if(data.type === 'shorts') {
                checkVideoStatus(data.data.response.id);
            }
        } catch (e) {
            loading.style.display = 'none';
            resultContent.innerText = "❌ Connection failed. Check Railway server logs.";
        }
    }

    async function checkVideoStatus(id) {
        const loadingText = document.getElementById('loading-text');
        const resultContent = document.getElementById('result-content');
        
        const interval = setInterval(async () => {
            loadingText.innerText = "⏳ AI is cutting & rendering... (Please Wait)";
            try {
                const res = await fetch(`${RAILWAY_URL}/status?id=${id}`);
                const statusData = await res.json();

                if(statusData.status === 'done') {
                    clearInterval(interval);
                    document.getElementById('loading').style.display = 'none';
                    resultContent.innerHTML = `
                        <p style="color:#28a745; font-weight:bold;">✅ Video Ready!</p>
                        <video width="100%" controls src="${statusData.url}" style="border-radius:10px;"></video>
                        <a href="${statusData.url}" download class="btn" style="margin-top:10px; display:block; text-decoration:none;">📥 Download MP4</a>
                    `;
                } else if(statusData.status === 'failed') {
                    clearInterval(interval);
                    document.getElementById('loading').style.display = 'none';
                    resultContent.innerText = "❌ Video rendering failed.";
                }
            } catch (e) {}
        }, 5000);
    }

    function copyResult() {
        const text = document.getElementById('result-content').innerText;
        navigator.clipboard.writeText(text).then(() => alert("Copied to clipboard!"));
    }
</script>
</body>
</html>
