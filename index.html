<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Viral Video Link</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Monetag SDK -->
    <script src='//libtl.com/sdk.js' data-zone='10939617' data-sdk='show_10939617'></script>
    <style>
        body { background: #0b141a; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { background: #1c2b36; border-radius: 15px; padding: 20px; border: 1px solid #2d3d4a; margin-top: 20px; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: none; background: #2d3d4a; color: white; margin-bottom: 10px; }
        .btn { background: #0088cc; color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .continue-btn { background: #244b6d; margin-top: 20px; }
        #output-section { display: none; margin-top: 20px; text-align: left; background: #1c2b36; padding: 15px; border-radius: 10px; }
    </style>
</head>
<body>
    <h2>AI VIRAL VIDEO LINK</h2>
    
    <div class="card">
        <input type="text" id="yt-link" placeholder="Paste YouTube Long Video Link...">
        <button class="btn" onclick="startProcess('shorts')">🎬 Create AI Shorts</button>
        <button class="btn" style="background:#128c7e;" onclick="startProcess('seo')">🔍 AI SEO Research</button>
    </div>

    <!-- Reward Gate (As per your Screenshot) -->
    <div id="reward-gate" style="display:none;" class="card">
        <p>Verification Required to Unlock AI Content</p>
        <button class="btn continue-btn" onclick="triggerAd()">Continue</button>
    </div>

    <div id="output-section">
        <h3 id="out-title"></h3>
        <div id="out-content"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let currentTask = "";

        function startProcess(type) {
            const link = document.getElementById('yt-link').value;
            if(!link) return alert("Please paste a link!");
            
            currentTask = type;
            document.getElementById('reward-gate').style.display = 'block';
        }

        function triggerAd() {
            // Your Rewarded Popup Code
            show_10939617('pop').then(() => {
                // Ad watch successful
                processAI();
            }).catch(e => {
                alert("Please watch the ad to continue!");
            });
        }

        async def processAI() {
            document.getElementById('reward-gate').style.display = 'none';
            document.getElementById('output-section').style.display = 'block';
            document.getElementById('out-content').innerText = "AI is thinking... please wait...";
            
            // Here we will call your Railway Backend
            // Example: fetch('your-railway-url/process?url=' + link + '&task=' + currentTask)
        }
    </script>
</body>
</html>
