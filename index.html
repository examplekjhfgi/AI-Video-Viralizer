<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Viral Video Link</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src='//libtl.com/sdk.js' data-zone='10939617' data-sdk='show_10939617'></script>
    <style>
        :root { --primary: #0088cc; --bg: #0b141a; --card: #1c2b36; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; margin: 0; }
        .card { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid #2d3d4a; max-width: 400px; margin: 20px auto; }
        input { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #333; background: #2d3d4a; color: white; box-sizing: border-box; margin-bottom: 15px; outline: none; }
        .btn { background: var(--primary); color: white; border: none; padding: 16px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; }
        .continue-btn { background: #244b6d; margin-top: 20px; }
        #output-section { display: none; margin-top: 20px; text-align: left; background: var(--card); padding: 20px; border-radius: 15px; max-width: 400px; margin: 20px auto; }
        #result-content { white-space: pre-wrap; font-size: 14px; line-height: 1.6; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid var(--primary); border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; margin-right: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <h2>Viral Video Link AI</h2>
    
    <div id="input-card" class="card">
        <input type="text" id="yt-link" placeholder="Paste YouTube Link...">
        <button class="btn" onclick="askPermission('shorts')">🎬 Create AI Shorts</button>
        <button class="btn" style="background:#128c7e; margin-top:10px;" onclick="askPermission('seo')">🔍 AI SEO Research</button>
    </div>

    <div id="reward-gate" class="card" style="display:none;">
        <p>Verification Required</p>
        <button class="btn continue-btn" onclick="triggerAd()">Continue</button>
    </div>

    <div id="output-section">
        <div id="loading" style="display:none;"><div class="loader"></div> <span id="loading-text">AI is thinking...</span></div>
        <div id="result-content"></div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    const RAILWAY_URL = "https://ai-video-viralizer-raliway-production.up.railway.app";
    let currentTask = "";

    function askPermission(type) {
        if(!document.getElementById('yt-link').value.includes('youtu')) return alert("Invalid Link");
        currentTask = type;
        document.getElementById('input-card').style.display = 'none';
        document.getElementById('reward-gate').style.display = 'block';
    }

    function triggerAd() {
        show_10939617('pop').then(() => callBackend()).catch(() => alert("Ad error"));
    }

    async function callBackend() {
        const link = document.getElementById('yt-link').value.trim();
        const resultContent = document.getElementById('result-content');
        document.getElementById('reward-gate').style.display = 'none';
        document.getElementById('output-section').style.display = 'block';
        document.getElementById('loading').style.display = 'block';

        try {
            const res = await fetch(`${RAILWAY_URL}/process?url=${encodeURIComponent(link)}&task=${currentTask}`);
            const data = await res.json();

            if(data.type === 'seo') {
                document.getElementById('loading').style.display = 'none';
                resultContent.innerText = data.data;
            } else if(data.type === 'shorts') {
                checkStatus(data.data.response.id);
            }
        } catch (e) {
            document.getElementById('loading').style.display = 'none';
            resultContent.innerText = "❌ Connection Failed. Try again.";
        }
    }

    async function checkStatus(id) {
        const loadingText = document.getElementById('loading-text');
        const resultContent = document.getElementById('result-content');
        
        const interval = setInterval(async () => {
            loadingText.innerText = "⏳ Rendering Video... (1-2 mins)";
            try {
                const res = await fetch(`${RAILWAY_URL}/status?id=${id}`);
                const statusData = await res.json();

                if(statusData.status === 'done') {
                    clearInterval(interval);
                    document.getElementById('loading').style.display = 'none';
                    resultContent.innerHTML = `✅ Ready!<br><video width="100%" controls src="${statusData.url}"></video><br><a href="${statusData.url}" download class="btn">📥 Download</a>`;
                } else if(statusData.status === 'failed') {
                    clearInterval(interval);
                    document.getElementById('loading').style.display = 'none';
                    resultContent.innerText = "❌ Render Failed.";
                }
            } catch (e) {}
        }, 5000);
    }
</script>
</body>
</html>
