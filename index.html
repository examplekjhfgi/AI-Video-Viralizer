<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 3D Generator | Brutal X</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0A0F1E; color: white; }
        .neon-accent { color: #1ED760; }
        .btn-gradient { background: linear-gradient(90deg, #1ED760, #1CE8A4); }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <div class="max-w-md w-full bg-[#161B22] p-8 rounded-2xl shadow-2xl border border-gray-800">
        <h1 class="text-3xl font-bold mb-2 neon-accent text-center">AI 3D Generator</h1>
        <p class="text-gray-400 text-sm text-center mb-6">Create 3D assets from text prompts</p>

        <input id="promptInput" type="text" placeholder="e.g. A futuristic chair" 
               class="w-full p-4 bg-[#0A0F1E] border border-gray-700 rounded-xl mb-4 focus:outline-none focus:border-[#1ED760]">

        <button onclick="generate3D()" id="genBtn"
                class="w-full p-4 btn-gradient rounded-xl font-bold text-black hover:opacity-90 transition shadow-lg">
            Generate 3D Model
        </button>

        <div id="status" class="mt-6 text-center text-sm text-gray-500"></div>
    </div>

    <script>
        async function generate3D() {
            const prompt = document.getElementById('promptInput').value;
            const status = document.getElementById('status');
            const btn = document.getElementById('genBtn');

            if (!prompt) return alert("Please enter a prompt!");

            status.innerText = "Generating... This might take 1-2 minutes.";
            btn.disabled = true;
            btn.style.opacity = "0.5";

            try {
                const response = await fetch('আপনার_রেলওয়ে_ইউআরএল/generate-3d', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: prompt })
                });

                if (response.ok) {
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'model_3d.glb';
                    document.body.appendChild(a);
                    a.click();
                    a.remove();
                    status.innerText = "Success! Your 3D model is downloaded.";
                } else {
                    status.innerText = "Error: Something went wrong on the server.";
                }
            } catch (error) {
                status.innerText = "Error: Could not connect to Railway.";
                console.error(error);
            } finally {
                btn.disabled = false;
                btn.style.opacity = "1";
            }
        }
    </script>
</body>
</html>
